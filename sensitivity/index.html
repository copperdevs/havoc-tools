<head>

    <script src="script.js"></script>
    <link rel="icon" type="image/x-icon" href="../images/favicon.ico">

    <meta property="og:title" content="Havoc Sensitivity Convertor">

<body class="body-light">
    <h1>Settings</h1>

    <span>Havoc DPI</span>
    <input type="range" min="0" max="2000" value="800" id="havocdpi" step="0.1">
    <input type="number" id="havocdpivalue" name="havocdpivalue" min="0" max="2000" value="800" step="0.1">

    <br>

    <label for="gameselector">Game - </label>
    <select id="gameselector" onchange="showGameSelectorContent(this.value)">
        <option value="gameselector-valorant">Valorant</option>
        <option value="gameselector-cs2">Counter Strike 2</option>
    </select>

    <br>

    <label for="unitselector">Unit - </label>
    <select id="unitselector" onchange="showUnitSelectorContent(this.value)">
        <option value="unitselector-inches">Inches</option>
        <option value="unitselector-centimeters">Centimeters</option>
    </select>

    <br>

    <label for="themeselector">Theme - </label>
    <select id="themeselector" onchange="themeSelector(this.value)">
        <option value="themeselector-light">Light</option>
        <option value="themeselector-dark">Dark</option>
        <option value="themeselector-lighter">Lighter</option>
        <option value="themeselector-darker">Darker</option>
        <option value="themeselector-discord">Discord</option>
    </select>

    <!--  -->

    <div id="gameselector-valorant">
        <h1>Valorant</h1>

        <span>Sensitivity</span>
        <input type="range" min="0.0" max="5.0" value="1.0" id="valorantsens" step="0.1">
        <input type="number" id="valorantsensvalue" name="valorantsensvalue" min="0.0" max="5.0" value="1.0" step="0.1">

        <br>

        <span>DPI</span>
        <input type="range" min="0" max="2000" value="800" id="valorantdpi" step="0.1">
        <input type="number" id="valorantdpivalue" name="valorantdpivalue" min="0" max="2000" value="800" step="0.1">

        <div id="valorantresult">Havoc sens - 2.07</div>
        <div id="valorant360distanceinches">360° Distance - 0</div>
        <div id="valorant360distancecentimeters">360° Distance - 0</div>
    </div>

    <div id="gameselector-cs2">
        <h1>Counter Strike 2</h1>

        <span>Sensitivity</span>
        <input type="range" min="0.0" max="5.0" value="1.0" id="cs2sens" step="0.1">
        <input type="number" id="cs2sensvalue" name="cs2sensvalue" min="0.0" max="5.0" value="1.0" step="0.1">

        <br>

        <span>DPI</span>
        <input type="range" min="0" max="2000" value="800" id="cs2dpi" step="0.1">
        <input type="number" id="cs2dpivalue" name="cs2dpivalue" min="0" max="2000" value="800" step="0.1">

        <div id="cs2result">Havoc sens - 0.41</div>
        <div id="cs2360distanceinches">360° Distance - 0</div>
        <div id="cs2360distancecentimeters">360° Distance - 0</div>
    </div>

    <br> <br>

    <h3>
        <a
            href="https://docs.google.com/spreadsheets/d/1atLfKpDrmEQ8inAo_9VcVr0K1-4zNSNC/edit?usp=sharing&rtpof=true&sd=true">
            Based off of this spreadsheet by voikmer</a>
    </h3>
</body>

</html>
