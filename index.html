<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>havoc sens</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>

<body>

    <div class="content">
        <h1>Havoc</h1>

        <!-- <span>Havoc DPI</span> -->
        <span>DPI</span>
        <input type="range" min="0" max="2000" value="800" id="havocdpi" step="0.1">
        <span id="havocdpivalue">800</span>

        <!--  -->

        <h1>Valorant</h1>

        <!-- <span>Valorant Sensitivity</span> -->
        <span>Sensitivity</span>
        <input type="range" min="0.0" max="5.0" value="1.0" id="valorantsens" step="0.1">
        <span id="valorantsensvalue">1</span>

        <br>

        <!-- <span>Valorant DPI</span> -->
        <span>DPI</span>
        <input type="range" min="0" max="2000" value="800" id="valorantdpi" step="0.1">
        <span id="valorantdpivalue">800</span>

        <!-- <div id="valorantresult">Valorant to Havoc sens - </div> -->
        <div id="valorantresult">Havoc sens - 2.07</div>

        <!--  -->

        <h1>Counter Strike 2</h1>

        <!-- <span>CS2 Sensitivity</span> -->
        <span>Sensitivity</span>
        <input type="range" min="0.0" max="5.0" value="1.0" id="cs2sens" step="0.1">
        <span id="cs2sensvalue">1</span>

        <br>

        <!-- <span>CS2 DPI</span> -->
        <span>DPI</span>
        <input type="range" min="0" max="2000" value="800" id="cs2dpi" step="0.1">
        <span id="cs2dpivalue">800</span>

        <!-- <div id="cs2result">Counter Strike 2 to Havoc sens - </div> -->
        <div id="cs2result">Havoc sens - 0.41</div>
    </div>

    <footer class="footer">
        <h3>
            <a
                href="https://docs.google.com/spreadsheets/d/1atLfKpDrmEQ8inAo_9VcVr0K1-4zNSNC/edit?usp=sharing&rtpof=true&sd=true">
                Based off of this spreadsheet by voikmer</a>
        </h3>
    </footer>
</body>

</html>
